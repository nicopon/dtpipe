name: Release

on:
  push:
    tags:
      - 'v*'


jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            rid: linux-x64
            runner: ubuntu-latest
            artifact: dtpipe-linux-x64
            rust_target: ""

          - platform: linux-arm64
            rid: linux-arm64
            runner: ubuntu-24.04-arm
            artifact: dtpipe-linux-arm64
            rust_target: ""

          - platform: macos-x64
            rid: osx-x64
            runner: macos-latest
            artifact: dtpipe-macos-x64
            rust_target: x86_64-apple-darwin

          - platform: macos-arm64
            rid: osx-arm64
            runner: macos-latest
            artifact: dtpipe-macos-arm64
            rust_target: ""

          - platform: windows-x64
            rid: win-x64
            runner: windows-latest
            artifact: dtpipe-windows-x64.exe
            rust_target: ""

          - platform: windows-arm64
            rid: win-arm64
            runner: windows-latest
            artifact: dtpipe-windows-arm64.exe
            rust_target: aarch64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.202'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/DtPipe.Processors.DataFusion
          shared-key: datafusion-${{ matrix.rid }}

      - name: Build DataFusion Bridge (Unix)
        if: "!contains(matrix.platform, 'windows')"
        env:
          RUST_TARGET: ${{ matrix.rust_target }}
          CARGO_BUILD_PROFILE: release-ci
        run: ./build_datafusion_bridge.sh

      - name: Build DataFusion Bridge (Windows)
        if: contains(matrix.platform, 'windows')
        env:
          CARGO_BUILD_PROFILE: release-ci
        run: |
          if ("${{ matrix.rust_target }}" -ne "") {
              $env:RUST_TARGET="${{ matrix.rust_target }}"
          }
          ./build_datafusion_bridge.ps1

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Release
        shell: bash
        run: |
          dotnet publish src/DtPipe/DtPipe.csproj -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:EnableCompressionInSingleFile=true \
            -p:DebugType=none \
            -p:DebugSymbols=false \
            -o ./dist/release

      - name: Prepare artifact (Unix)
        if: "!contains(matrix.platform, 'windows')"
        run: |
          if [ -f "./dist/release/DtPipe" ]; then mv ./dist/release/DtPipe ./dist/release/dtpipe; fi
          chmod +x ./dist/release/dtpipe

      - name: Prepare artifact (Windows)
        if: contains(matrix.platform, 'windows')
        shell: bash
        run: |
          if [ -f "./dist/release/DtPipe.exe" ]; then mv ./dist/release/DtPipe.exe ./dist/release/dtpipe.exe; fi

      - name: Create archive (Unix)
        if: "!contains(matrix.platform, 'windows')"
        run: |
          cd ./dist/release
          tar -czf ${{ matrix.artifact }}.tar.gz dtpipe

      - name: Create archive (Windows)
        if: contains(matrix.platform, 'windows')
        shell: pwsh
        run: |
          cd ./dist/release
          Compress-Archive -Path dtpipe.exe -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ./dist/release/*.tar.gz
            ./dist/release/*.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Move archives to release directory
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} release/ \;
          ls -lh release/

      - name: Determine if pre-release
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" =~ (alpha|beta|rc) ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: true

  publish-nuget:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.202'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build DataFusion Bridge
        run: ./build_datafusion_bridge.sh

      - name: Pack All Projects
        run: dotnet pack DtPipe.sln -c Release

      - name: Push to NuGet
        # Push only DtPipe.* or dtpipe.* packages, skipping duplicate versions.
        run: |
          find . -name "*.nupkg" \
            -iname "dtpipe*" \
            -exec dotnet nuget push {} --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate \;
